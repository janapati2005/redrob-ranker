  has_network_during_ranking: false
  pre_computation_required: false
  pre_computation_time_minutes: 0

ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude for architecture discussion, code review, and step-by-step
  development guidance. All engineering decisions, debugging, and understanding
  of the pipeline were done by the team. No candidate data was fed to
  any LLM during ranking.

methodology_summary: |
  Rule-based hybrid ranker with 6 scoring components: skill depth (35%),
  career trajectory (30%), experience fit (15%), location fit (10%), and
  GitHub activity (10%). Availability applied as a multiplicative modifier
  (0.4-1.0) based on last active date, recruiter response rate, open-to-work
  flag, and notice period. Honeypot detection removes 108 impossible profiles
  before scoring. Runtime: ~12 seconds for 100K candidates on CPU.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true