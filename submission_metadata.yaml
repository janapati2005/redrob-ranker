ai_usage_summary: |
  Used Claude for architecture discussion, code review, and step-by-step
  development guidance. All engineering decisions, debugging, and understanding
  of the pipeline were done by the team. No candidate data was fed to any LLM
  during ranking. All scoring is done locally with no API calls.

# ── Approach Summary ───────────────────────────────────────────────────────────
methodology_summary: |
  Rule-based hybrid ranker with 6 scoring components combined with a
  behavioral availability multiplier.

  Scoring weights derived from JD priority analysis:
    - Skill Match (35%): proficiency level, endorsements, duration, assessment scores
    - Career Trajectory (30%): title alignment, product company experience, consulting penalty
    - Experience Fit (15%): years of experience vs JD requirement of 5 to 9 years
    - Location Fit (10%): India preferred, Pune and Noida ideal
    - GitHub Activity (10%): open source contribution score
    - Availability (multiplier 0.40 to 1.00): last active, response rate, notice period

  Skill names normalized for punctuation-insensitive matching so that
  sentence-transformers correctly matches sentence transformers.

  Honeypot detection removes 108 impossible profiles before scoring by
  checking for expert skill with zero months usage, experience exceeding
  career history by more than 3 years, and out-of-range signal values.

  Tiebreaker: candidate_id ascending, matching competition validator rule.
  Runtime: 13 seconds for 100,000 candidates on CPU with no GPU.

